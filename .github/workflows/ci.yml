name: CI

on:
  pull_request:
  push:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run test
        run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run build
        run: pnpm build

  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, build]
    if: ${{ always() }}
    steps:
      - name: Fail when required jobs fail
        shell: bash
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.typecheck.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "One or more required jobs failed."
            exit 1
          fi
          echo "All required jobs passed."

  workflow-governance:
    name: Workflow Governance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate workflow guardrails
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [ -z "${BASE_SHA:-}" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$(git rev-parse HEAD~1)"
          fi

          CHANGED_WORKFLOWS="$(git diff --name-only "$BASE_SHA" "${{ github.sha }}" -- .github/workflows || true)"

          if [ -z "$CHANGED_WORKFLOWS" ]; then
            echo "No workflow file changes detected."
            exit 0
          fi

          echo "Changed workflow files:"
          echo "$CHANGED_WORKFLOWS"

          if rg -n "placeholder" .github/workflows; then
            echo "Detected forbidden placeholder workflow logic."
            exit 1
          fi

          rg -n "^  verify:" .github/workflows/ci.yml >/dev/null
          rg -n "^    name: Verify$" .github/workflows/ci.yml >/dev/null
          rg -n "^  mcp-smoke:" .github/workflows/ci.yml >/dev/null

          echo "Workflow governance checks passed."

  dependency-risk:
    name: Dependency Risk
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate dependency change hygiene
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [ -z "${BASE_SHA:-}" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$(git rev-parse HEAD~1)"
          fi

          CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "${{ github.sha }}" || true)"
          DEP_CHANGED="$(echo "$CHANGED_FILES" | rg "^(package\.json|pnpm-lock\.yaml|mcp/.*/package\.json)$" || true)"

          if [ -z "$DEP_CHANGED" ]; then
            echo "No dependency manifest changes detected."
            exit 0
          fi

          echo "Dependency-related files changed:"
          echo "$DEP_CHANGED"

          if echo "$DEP_CHANGED" | rg "^package\.json$" >/dev/null && ! echo "$DEP_CHANGED" | rg "^pnpm-lock\.yaml$" >/dev/null; then
            echo "package.json changed without pnpm-lock.yaml update."
            exit 1
          fi

          if rg -n "\"(latest|\\*)\"" package.json; then
            echo "Disallowed dependency version detected (latest or wildcard)."
            exit 1
          fi

          echo "Dependency risk checks passed."

  mcp-smoke:
    name: MCP Smoke
    runs-on: ubuntu-latest
    # Optional guardrail: this job is intentionally non-required and secrets-gated.
    if: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL != '' && secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY != '' && secrets.SUPABASE_SERVICE_ROLE_KEY != '' && secrets.HINEAR_MCP_EMAIL != '' }}
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      APP_ORIGIN: ${{ vars.APP_ORIGIN || 'http://localhost:3000' }}
      HINEAR_MCP_EMAIL: ${{ secrets.HINEAR_MCP_EMAIL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Hinear MCP login
        run: pnpm mcp:hinear:login --email "$HINEAR_MCP_EMAIL" --non-interactive

      - name: MCP Typecheck
        run: pnpm mcp:hinear:typecheck

      - name: MCP Read Smoke
        run: pnpm mcp:hinear:smoke

      - name: Debug MCP config keys
        if: failure()
        run: |
          echo "mcp/hinear/.env.local keys:"
          if [ -f mcp/hinear/.env.local ]; then
            cut -d= -f1 mcp/hinear/.env.local
          else
            echo "missing"
          fi
